dev: true
title: zzz
frequency: 3
dirfilter:
- tmp
- .git
- public
- scripts
- target
- logs
- templates
ext:
- rs
lang: golang
enablerun: true
action:
  before:
  - find . -name ".DS_Store" -print -delete
  after:
  - ps -ef|grep 'network_probe server'| grep -v grep | awk '{print $2}' | xargs kill -9
  - ./network_probe server &
  exit:
  - ps -ef|grep 'network_probe server'| grep -v grep | awk '{print $2}' | xargs kill -9
link: https://github.com/midoks/zzz
